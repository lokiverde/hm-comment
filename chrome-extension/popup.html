<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HM Comment</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: 'Avenir', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #333;
      background: #fff;
    }
    .header {
      padding: 14px 16px;
      background: linear-gradient(-45deg, #1a3a5c, #0073b1, #1a3a5c, #0073b1);
      background-size: 400% 400%;
      animation: gradient 5s ease infinite;
      color: #fff;
    }
    .header h1 {
      font-size: 16px;
      font-weight: bold;
    }
    .header p {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 2px;
    }
    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #eee;
    }
    .section:last-child { border-bottom: none; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 6px;
    }
    select, input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: #333;
      background: #f9f9f9;
      outline: none;
    }
    select:focus, input[type="text"]:focus {
      border-color: #0073b1;
    }
    .save-btn {
      width: 100%;
      padding: 10px;
      background: #0073b1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .save-btn:hover { background: #005f8f; }
    .status {
      font-size: 12px;
      color: #2e7d32;
      text-align: center;
      margin-top: 8px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>HM Comment</h1>
    <p>AI-powered LinkedIn comments</p>
  </div>
  <div class="section">
    <label for="tone">Default Tone</label>
    <select id="tone">
      <option value="default">Default Voice</option>
      <option value="hormozi">Hormozi Style</option>
      <option value="professional">Professional</option>
      <option value="casual">Casual</option>
    </select>
  </div>
  <div class="section">
    <label for="webhookUrl">Webhook URL</label>
    <input type="text" id="webhookUrl" placeholder="https://your-n8n-instance.com/webhook/hm-comment">
  </div>
  <div class="section">
    <button class="save-btn" id="saveBtn">Save Settings</button>
    <div class="status" id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
